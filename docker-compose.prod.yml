services:
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
      target: runtime
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes: []
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: runtime
    environment:
      APP_ENV: production
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: runtime
    environment:
      APP_ENV: production
    volumes: []
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

  celery-beat:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: runtime
    environment:
      APP_ENV: production
    volumes: []
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  postgres:
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  minio:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  mlflow:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  jupyter:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 3G
        reservations:
          cpus: "0.50"
          memory: 512M

  nginx:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
