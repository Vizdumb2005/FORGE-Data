apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jupyter
spec:
  replicas: {{ .Values.replicas.jupyter }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-jupyter
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-jupyter
    spec:
      containers:
        - name: jupyter
          image: "{{ .Values.image.jupyter.repository }}:{{ .Values.image.jupyter.tag }}"
          args:
            - start-notebook.py
            - --NotebookApp.token=''
            - --NotebookApp.password=''
            - --NotebookApp.allow_origin='*'
          ports:
            - containerPort: 8888
          resources:
            {{- toYaml .Values.resources.jupyter | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jupyter
spec:
  type: {{ .Values.service.jupyter.type }}
  selector:
    app: {{ .Release.Name }}-jupyter
  ports:
    - name: http
      port: {{ .Values.service.jupyter.port }}
      targetPort: 8888
