image:
  pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/your-org/forge-data-web
    tag: latest
  api:
    repository: ghcr.io/your-org/forge-data-api
    tag: latest
  mlflow:
    repository: ghcr.io/mlflow/mlflow
    tag: latest
  redis:
    repository: redis
    tag: 7-alpine
  postgres:
    repository: postgres
    tag: 16-alpine
  minio:
    repository: minio/minio
    tag: latest
  jupyter:
    repository: jupyter/base-notebook
    tag: latest

replicas:
  web: 2
  api: 2
  mlflow: 1
  redis: 1
  jupyter: 1

service:
  web:
    type: ClusterIP
    port: 3000
  api:
    type: ClusterIP
    port: 8000
  mlflow:
    type: ClusterIP
    port: 5000
  redis:
    type: ClusterIP
    port: 6379
  jupyter:
    type: ClusterIP
    port: 8888
  minio:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  postgres:
    type: ClusterIP
    port: 5432

ingress:
  enabled: true
  className: nginx
  host: forge.local
  annotations: {}
  tls:
    enabled: false
    secretName: forge-data-tls

storage:
  postgres:
    size: 20Gi
  minio:
    size: 100Gi

resources:
  web:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1, memory: 1Gi }
  api:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2, memory: 2Gi }
  postgres:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 2Gi }
  redis:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  minio:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 2Gi }
  mlflow:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: 1, memory: 1Gi }
  jupyter:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: 2, memory: 4Gi }

autoscaling:
  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

env:
  APP_ENV: production
  NODE_ENV: production
  API_PREFIX: /api/v1
  CORS_ORIGINS: "*"

secrets:
  jwtSecret: change-me
  postgresPassword: change-me
  minioSecretKey: change-me
  minioAccessKey: forge
  openaiApiKey: ""
  anthropicApiKey: ""
  ollamaBaseUrl: ""
