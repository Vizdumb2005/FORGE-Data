name: CI
on: [push, pull_request]

jobs:
  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://forge:forge@localhost:5432/forge
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt ruff
      - run: ruff check .
      - run: alembic -c alembic.ini upgrade head
      - run: pytest tests/ -v --tb=short

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests --ci

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: infra/docker/Dockerfile.web
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/forge-data-web:latest
            ghcr.io/${{ github.repository_owner }}/forge-data-web:sha-${{ steps.vars.outputs.sha_short }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: infra/docker/Dockerfile.api
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/forge-data-api:latest
            ghcr.io/${{ github.repository_owner }}/forge-data-api:sha-${{ steps.vars.outputs.sha_short }}
