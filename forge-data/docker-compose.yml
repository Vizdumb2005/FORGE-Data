version: '3.9'

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost/api/ws}
    depends_on:
      - api
    networks:
      - forge-net
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forge-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='*'
    restart: unless-stopped

  # ── Jupyter Kernel Gateway ────────────────────────────────────────────────
  jupyter:
    build:
      context: ./infra/docker
      dockerfile: Dockerfile.jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=
      - KG_AUTH_TOKEN=
      - KG_LIST_KERNELS=True
      - JUPYTER_SERVER_ALLOW_UNAUTHENTICATED_ACCESS=true
    volumes:
      - ./notebooks:/home/jovyan/work
    networks:
      - forge-net
    restart: unless-stopped

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow-artifacts:/mlflow/artifacts
    environment:
      - MLFLOW_TRACKING_URI=postgresql://forge:forge@postgres/forge_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - forge-net
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://forge:forge@postgres/forge_mlflow
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=forge
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - forge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - forge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO Object Storage ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=forge
      - MINIO_ROOT_PASSWORD=forgedata123
    volumes:
      - miniodata:/data
    networks:
      - forge-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - jupyter
    networks:
      - forge-net
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local

networks:
  forge-net:
    driver: bridge
