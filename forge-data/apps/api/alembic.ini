# ════════════════════════════════════════════════════════════════════════════
# Alembic configuration for FORGE Data API
#
# Run migrations:     alembic upgrade head
# Create revision:    alembic revision --autogenerate -m "description"
# Show history:       alembic history --verbose
# Downgrade one step: alembic downgrade -1
# ════════════════════════════════════════════════════════════════════════════

[alembic]
# Path to the migrations directory (relative to this file)
script_location = migrations

# Prepend the api root to sys.path so 'from app.xxx import ...' works
prepend_sys_path = .

# The default SQLAlchemy URL — overridden by DATABASE_URL env var in migrations/env.py
sqlalchemy.url = postgresql+asyncpg://forge:forge@postgres:5432/forge

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
