events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Real IP — only trust X-Forwarded-For from the Docker bridge ──────────
    # Adjust the CIDR if your Docker network uses a different range.
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Upstreams ────────────────────────────────────────────────────────────
    upstream web_upstream {
        server web:3000;
    }

    upstream api_upstream {
        server api:8000;
    }

    upstream jupyter_upstream {
        server jupyter:8888;
    }

    upstream mlflow_upstream {
        server mlflow:5000;
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # ── Global security headers ───────────────────────────────────────
        add_header X-Frame-Options          "DENY"                              always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # ── Frontend (Next.js) ────────────────────────────────────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── API (FastAPI) ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # WebSocket support for /api/ws
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
        }

        # ── Jupyter Lab / Kernel Gateway ──────────────────────────────────
        # Protected by HTTP Basic Auth at the nginx layer.
        # The password file is mounted at /etc/nginx/.htpasswd
        # Generate with: htpasswd -c /etc/nginx/.htpasswd <username>
        location /jupyter/ {
            # Require HTTP Basic Auth before proxying to Jupyter
            auth_basic           "FORGE Jupyter";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass         http://jupyter_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── MLflow tracking UI/API ────────────────────────────────────────
        # Exposed under /mlflow so it bypasses Next.js auth redirects.
        location = /mlflow/api/2.0/mlflow/experiments/list {
            proxy_pass         http://api_upstream/api/mlflow/experiments/list;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location = /mlflow {
            return 301 /mlflow/;
        }

        location ^~ /mlflow/ {
            add_header         X-Forge-Proxy "mlflow" always;
            rewrite            ^/mlflow/(.*)$ /$1 break;
            proxy_pass         http://mlflow_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Health check endpoint (nginx level) ───────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
