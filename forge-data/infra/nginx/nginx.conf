events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstreams ────────────────────────────────────────────────────────────
    upstream web_upstream {
        server web:3000;
    }

    upstream api_upstream {
        server api:8000;
    }

    upstream jupyter_upstream {
        server jupyter:8888;
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # ── Frontend (Next.js) ────────────────────────────────────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── API (FastAPI) ─────────────────────────────────────────────────
        # Note: trailing slash is important — strips /api prefix before forwarding
        location /api/ {
            proxy_pass         http://api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # WebSocket support for /api/ws
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
        }

        # ── Jupyter Lab / Kernel Gateway ──────────────────────────────────
        location /jupyter/ {
            proxy_pass         http://jupyter_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── Health check endpoint (nginx level) ───────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
